name: Build qtermwidget wheels (cibuildwheel)

on: [push, pull_request]


jobs:
  build:
    runs-on: ${{ matrix.os.runner }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os.runner }}-${{ matrix.qt_version }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [{name: "linux", runner: "ubuntu-latest"}, {name: "macos", runner: "macos-latest"}]
        qt_version: ["6.9.0"]

    steps:
      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Checkout pyside6-qtermwidget
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore cached Qt installation
        id: cache-qt-lib-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/Qt
          key: qt-${{ matrix.qt_version }}-lib

      - name: Install Qt Lib
        if: steps.cache-qt-lib-restore.outputs.cache-hit != 'true'
        run: |
          python -m pip install aqtinstall
          aqt install-qt linux desktop ${{ matrix.qt_version }} --outputdir ${{ github.workspace }}/Qt
          aqt install-qt mac desktop ${{ matrix.qt_version }} --outputdir ${{ github.workspace }}/Qt
      
      - name: Save Qt lib cache
        if: steps.cache-qt-lib-restore.outputs.cache-hit != 'true'
        id: cache-qt-lib-save
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/Qt
          key: ${{ steps.cache-qt-lib-restore.outputs.cache-primary-key }}

      - name: Generate pyproject.toml
        run: |
          python -m pip install jinja2-cli
          jinja2 pyproject.toml.jinja -D QT_VERSION="${{ matrix.qt_version }}" -o pyproject.toml
          echo "USING pyproject.toml:"
          cat pyproject.toml

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBUILDWHEEL_WORKSPACE: ${{ github.workspace }}
          CIBW_ENVIRONMENT_MACOS: >
            Qt6_DIR=${{ github.workspace }}/Qt/${{ matrix.qt_version }}/macos
            QT6_INSTALL_DIR=${{ github.workspace }}/Qt/${{ matrix.qt_version }}/macos
        with:
          output-dir: ./wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: qtermwidget-${{ matrix.os.name }}-qt${{ matrix.qt_version }}
          path: wheelhouse/*.whl

  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
       qt_version: ["6.9.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install build

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: qtermwidget-*-qt${{ matrix.qt_version }}
          merge-multiple: true
          path: artifacts

      - name: Move artifact wheels to dist
        run: |
              ls artifacts
              mkdir dist
              shopt -s nullglob  # glob expands to nothing if no match
              for f in artifacts/*.zip; do
                echo "Extracting $f..."
                unzip -q "$f" -d dist
              done
              mv artifacts/*.whl dist

      - name: Generate pyproject.toml
        run: |
          python -m pip install jinja2-cli
          jinja2 pyproject.toml.jinja -D QT_VERSION="${{ matrix.qt_version }}" -o pyproject.toml
          echo "USING pyproject.toml:"
          cat pyproject.toml

      - name: Build sdist
        run: python -m build --sdist
      
      - name: debug
        run: ls dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          verbose: true
          password: ${{ secrets.CI_PYPI_TOKEN }}